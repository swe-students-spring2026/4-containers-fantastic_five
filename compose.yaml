services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ml-client:
    build: ./machine-learning-client
    container_name: ml-client
    depends_on:
      - mongodb
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/appdb}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  web-app:
    build: ./web-app
    container_name: web-app
    depends_on:
      - mongodb
    volumes:
      - ./machine-learning-client:/machine-learning-client:ro
    ports:
      - "5001:5000"
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/appdb}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

volumes:
  mongo_data:
